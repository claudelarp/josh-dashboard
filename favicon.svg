<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC978"/>
      <stop offset="55%" stop-color="#F3714F"/>
      <stop offset="100%" stop-color="#E2577A"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#08080A"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="56"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ringGrad)" stroke-width="56"
    stroke-linecap="round" stroke-dasharray="734 272" transform="rotate(-90 256 256)"/>
  <circle cx="97" cy="276" r="30" fill="#FFDCA8" filter="url(#glow)"/>
</svg>
